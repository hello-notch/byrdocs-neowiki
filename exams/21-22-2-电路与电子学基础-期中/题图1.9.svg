<svg width="700" height="450" xmlns="http://www.w3.org/2000/svg">
  <style>
    .wire { stroke: black; stroke-width: 3; fill: none; }
    .inductor { stroke: black; stroke-width: 4; fill: none; stroke-linecap: round; stroke-linejoin: round; }
    .resistor { stroke: #000080; stroke-width: 4; fill: white; }
    .node { fill: #000080; }
    .terminal { stroke: #000080; stroke-width: 3; fill: white; }
    .arrow { fill: black; }
    .label { font-family: "Times New Roman", serif; font-size: 52px; fill: black; }
    .label-italic { font-family: "Times New Roman", serif; font-size: 52px; font-style: italic; fill: black; }
  </style>

  <!-- Wires -->
  <line x1="120" y1="100" x2="500" y2="100" class="wire" />
  <line x1="120" y1="350" x2="500" y2="350" class="wire" />
  <line x1="300" y1="100" x2="300" y2="350" class="wire" />
  <line x1="500" y1="100" x2="500" y2="200" class="wire" />
  <line x1="500" y1="320" x2="500" y2="350" class="wire" />

  <!-- Nodes -->
  <circle cx="300" cy="100" r="7" class="node" />
  <circle cx="300" cy="350" r="7" class="node" />

  <!-- Terminals -->
  <circle cx="120" cy="100" r="8" class="terminal" />
  <circle cx="120" cy="350" r="8" class="terminal" />

  <!-- Arrows on wires -->
  <!-- i(t) pointing right -->
  <polygon points="230,100 205,88 215,100 205,112" class="arrow" />
  <!-- i_L(t) pointing down -->
  <polygon points="500,165 488,140 500,148 512,140" class="arrow" />

  <!-- Components -->
  <!-- 2Ω Resistor -->
  <rect x="288" y="195" width="24" height="60" class="resistor" />
  
  <!-- 5mH Inductor (3 loops) -->
  <path d="M 500 200 A 24 24 0 1 1 500 240 A 24 24 0 1 1 500 280 A 24 24 0 1 1 500 320" class="inductor" />

  <!-- Labels -->
  <!-- Left Voltage u(t) -->
  <text x="80" y="115" class="label" text-anchor="end">+</text>
  <text x="80" y="365" class="label" text-anchor="end">−</text>
  <text x="85" y="240" class="label-italic" text-anchor="end">u(t)</text>

  <!-- Top Current i(t) -->
  <text x="215" y="70" class="label-italic" text-anchor="middle">i(t)</text>
  
  <!-- Middle Resistor 2Ω -->
  <text x="270" y="240" class="label" text-anchor="end">2Ω</text>

  <!-- Right Current i_L(t) -->
  <text x="525" y="145" class="label-italic" text-anchor="start">i<tspan baseline-shift="sub" font-size="0.75em">L</tspan>(t)</text>

  <!-- Right Inductor 5mH -->
  <text x="545" y="275" class="label" text-anchor="start">5mH</text>
</svg>
