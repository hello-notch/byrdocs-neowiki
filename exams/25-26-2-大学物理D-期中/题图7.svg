  <!-- x轴 -->
  <line x1="340" y1="185"
        x2="735" y2="185"
        stroke="black"
        stroke-width="4"/>

  <polygon points="745,185 713,164 713,206"
           fill="black"/>

  <!-- x -->
  <text x="748" y="235"
        font-size="42"
        font-family="Times New Roman"
        font-style="italic">
    x
  </text>

  <!-- O -->
  <text x="338" y="235"
        font-size="44"
        font-family="Times New Roman"
        font-style="italic">
    O
